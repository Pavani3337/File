<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Offline Digital Library
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>
📚 Offline Digital Library
</h1>

<!-- UPLOAD SECTION -->

<div class="box">

<h2>
📤 Upload Study Material
</h2>

<input type="text"
id="fileName"
placeholder="File Name">

<select id="subject">

<option value="History">
History
</option>

<option value="Geography">
Geography
</option>

<option value="Polity">
Polity
</option>

<option value="Economy">
Economy
</option>

<option value="Science">
Science
</option>

<option value="Programming">
Programming
</option>

</select>

<input type="file"
id="fileInput">

<label class="favoriteBox">

<input type="checkbox"
id="favorite">

⭐ Mark as Favorite

</label>

<button id="uploadBtn">
Upload File
</button>

</div>

<!-- SEARCH -->

<div class="box">

<h2>
🔍 Search Files
</h2>

<input type="text"
id="searchInput"
placeholder="Search File">

</div>

<!-- FILES -->

<div class="box">

<h2>
📂 Library Files
</h2>

<div id="fileContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
